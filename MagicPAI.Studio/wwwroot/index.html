<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MagicPAI Studio</title>
    <base href="/" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />

    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="css/app.css" rel="stylesheet" />
</head>
<body>
    <div id="app">
        <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;background:#0f172a;color:#f1f5f9;font-family:Roboto,system-ui,sans-serif;gap:1rem;">
            <div style="width:40px;height:40px;border:3px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:mpai-spin .8s linear infinite;"></div>
            <p style="color:#94a3b8;font-size:.875rem;">Loading MagicPAI Studio&hellip;</p>
            <style>@keyframes mpai-spin{to{transform:rotate(360deg)}}</style>
        </div>
    </div>

    <div id="blazor-error-ui" style="display:none;">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss" style="cursor:pointer;">Dismiss</a>
    </div>

    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="mpai.js"></script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
