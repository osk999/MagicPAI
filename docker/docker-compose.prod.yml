version: '3.8'

services:
  server:
    build:
      context: ..
      dockerfile: docker/server/Dockerfile
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__MagicPai=Host=db;Database=magicpai;Username=magicpai;Password=${POSTGRES_PASSWORD:-magicpai_prod}
      - MagicPAI__UseDocker=true
      - MagicPAI__WorkerImage=magicpai-env:latest
      - MagicPAI__EnableContainerPool=true
      - MagicPAI__ContainerPoolSize=3
      - Elsa__Identity__SigningKey=${ELSA_SIGNING_KEY:-replace-with-a-secure-production-key-at-least-32-chars}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - workspaces:/workspaces
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: magicpai
      POSTGRES_USER: magicpai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-magicpai_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U magicpai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-env-builder:
    build:
      context: worker-env
      dockerfile: Dockerfile
    image: magicpai-env:latest
    profiles: ["build"]

volumes:
  pgdata:
  workspaces:
  redisdata:
