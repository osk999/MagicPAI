# Temporal dynamic config — development.
# Docs: https://github.com/temporalio/temporal/blob/main/docs/dynamicconfig.md
# See temporal.md §13.4.

limit.maxIDLength:
  - value: 255
    constraints: {}

system.forceSearchAttributesCacheRefreshOnRead:
  - value: true
    constraints: {}

# Payload size limits
limit.blobSize.warn:
  - value: 2097152          # 2 MiB
    constraints: {}
limit.blobSize.error:
  - value: 10485760         # 10 MiB
    constraints: {}

# History size limits (default caps; keep to catch design errors)
history.historySizeLimitError:
  - value: 52428800         # 50 MiB
    constraints: {}
history.historyCountLimitError:
  - value: 51200
    constraints: {}

# Per-namespace RPC rate limits — generous for dev
frontend.namespaceRPS:
  - value: 2400
    constraints: {}

# Worker task timeout grace
worker.removableBuildIdDurationSinceDefault:
  - value: "3s"
    constraints: {}

# Enable visibility writes to concrete table
system.enableWriteEventHistoryToConcreteTable:
  - value: true
    constraints: {}
