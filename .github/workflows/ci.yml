name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main, temporal]
  schedule:
    - cron: '0 4 * * *'   # Nightly 04:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: '1'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
  DOTNET_NOLOGO: '1'

jobs:

  lint:
    name: Lint / format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - name: Restore
        run: dotnet restore
      - name: Verify format
        run: dotnet format --verify-no-changes --severity error

  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      sha-short: ${{ steps.vars.outputs.sha-short }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            **/bin
            **/obj
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Build.props', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-
      - id: vars
        run: echo "sha-short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Build
        run: dotnet build --configuration Release --nologo -warnaserror
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: '**/bin/Release/**'
          retention-days: 3

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
      - name: Run unit tests
        run: dotnet test --filter "Category=Unit" -c Release --logger trx --no-restore
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: unit-test-results, path: '**/*.trx' }

  integration-tests:
    name: Integration tests (WorkflowEnvironment)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
      - name: Run integration tests
        run: dotnet test --filter "Category=Integration" -c Release --logger trx --no-restore
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: integration-test-results, path: '**/*.trx' }

  replay-tests:
    name: Replay tests (determinism gate)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
      - name: Run replay tests
        run: dotnet test --filter "Category=Replay" -c Release --logger trx --no-restore
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: replay-test-results, path: '**/*.trx' }

  determinism-grep:
    name: Workflow determinism grep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for non-deterministic APIs in workflow code
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='DateTime\.(UtcNow|Now)|Guid\.NewGuid\(\)|new Random|Thread\.Sleep|Task\.Delay'
          SAFE='Workflow\.(UtcNow|NewGuid|Random|DelayAsync)'
          if [ -d MagicPAI.Workflows ]; then
            BAD=$(grep -rnE "$PATTERN" MagicPAI.Workflows/ 2>/dev/null | grep -vE "$SAFE" || true)
            if [ -n "$BAD" ]; then
              echo "❌ Non-deterministic APIs in workflow code:"
              echo "$BAD"
              exit 1
            fi
          fi
          echo "✅ Workflow code is deterministic"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: trufflesecurity/trufflehog@main
        with:
          path: .
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  docker-build:
    name: Docker smoke build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build server image
        run: |
          if [ -f docker/server/Dockerfile ]; then
            docker build -f docker/server/Dockerfile -t mpai-server:ci .
          fi
      - name: Build worker-env image
        run: |
          if [ -f docker/worker-env/Dockerfile ]; then
            docker build -f docker/worker-env/Dockerfile -t magicpai-env:ci docker/worker-env/
          fi

  e2e-nightly:
    name: E2E tests (nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - name: Start Temporal dev server (CLI)
        run: |
          curl -sSfL https://temporal.download/cli.sh | sh
          $HOME/.temporalio/bin/temporal server start-dev --namespace magicpai --db-filename /tmp/temporal-dev.db &
          echo "Waiting for Temporal UI..."
          for i in {1..30}; do
            if curl -fsS http://localhost:8233/health >/dev/null 2>&1; then break; fi
            sleep 2
          done
      - name: Run E2E tests
        run: dotnet test --filter "Category=E2E" -c Release --logger trx
      - name: Teardown
        if: always()
        run: pkill -f 'temporal server' || true

  security-audit-nightly:
    name: Security audit (nightly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - run: dotnet restore
      - name: List vulnerable packages
        shell: bash
        run: |
          set +e
          OUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$OUT"
          if echo "$OUT" | grep -q "has the following vulnerable packages"; then
            exit 1
          fi
      - name: List outdated
        run: dotnet list package --outdated || true
