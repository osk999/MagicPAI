apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: magicpai

resources:
  - ../../base
  - hpa.yaml
  - ingress.yaml

patches:
  # Prod: 3 replicas, larger resource limits
  - target:
      kind: Deployment
      name: magicpai-server
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: magicpai-server
      spec:
        replicas: 3
        template:
          spec:
            containers:
              - name: server
                resources:
                  requests:
                    memory: "1Gi"
                    cpu: "500m"
                  limits:
                    memory: "4Gi"
                    cpu: "2000m"
  - target:
      kind: StatefulSet
      name: magicpai-postgres
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: magicpai-postgres
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    memory: "512Mi"
                    cpu: "250m"
                  limits:
                    memory: "2Gi"
                    cpu: "1000m"
