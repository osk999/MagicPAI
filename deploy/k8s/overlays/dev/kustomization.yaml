apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: magicpai

resources:
  - ../../base

patches:
  # Dev: single replica, smaller resource limits
  - target:
      kind: Deployment
      name: magicpai-server
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: magicpai-server
      spec:
        replicas: 1
        template:
          spec:
            containers:
              - name: server
                resources:
                  requests:
                    memory: "256Mi"
                    cpu: "100m"
                  limits:
                    memory: "1Gi"
                    cpu: "500m"
  - target:
      kind: StatefulSet
      name: magicpai-postgres
    patch: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: magicpai-postgres
      spec:
        template:
          spec:
            containers:
              - name: postgres
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "50m"
                  limits:
                    memory: "512Mi"
                    cpu: "250m"
