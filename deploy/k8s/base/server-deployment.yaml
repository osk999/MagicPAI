apiVersion: apps/v1
kind: Deployment
metadata:
  name: magicpai-server
  namespace: magicpai
  labels:
    app.kubernetes.io/name: magicpai-server
    app.kubernetes.io/part-of: magicpai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: magicpai-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magicpai-server
        app.kubernetes.io/part-of: magicpai
    spec:
      serviceAccountName: magicpai-server
      containers:
        - name: server
          image: magicpai-server:latest
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: ASPNETCORE_URLS
              value: "http://+:8080"
          volumeMounts:
            - name: config
              mountPath: /app/appsettings.Production.json
              subPath: appsettings.Production.json
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: magicpai-server-config
