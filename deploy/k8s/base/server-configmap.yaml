apiVersion: v1
kind: ConfigMap
metadata:
  name: magicpai-server-config
  namespace: magicpai
  labels:
    app.kubernetes.io/name: magicpai-server
    app.kubernetes.io/part-of: magicpai
data:
  appsettings.Production.json: |
    {
      "ConnectionStrings": {
        "MagicPai": "Host=magicpai-postgres;Database=magicpai;Username=magicpai;Password=magicpai"
      },
      "MagicPAI": {
        "UseDocker": false,
        "ExecutionBackend": "kubernetes",
        "WorkerImage": "magicpai-env:latest",
        "DefaultMemoryLimitMb": 4096,
        "DefaultCpuCount": 2,
        "MaxConcurrentContainers": 5,
        "ContainerTimeoutMinutes": 30,
        "EnableContainerPool": true,
        "ContainerPoolSize": 3,
        "EnableVerification": true,
        "EnableRepair": true,
        "MaxRepairAttempts": 5,
        "EnableSignalR": true
      },
      "Elsa": {
        "Identity": {
          "SigningKey": "REPLACE_WITH_SECURE_PRODUCTION_KEY_AT_LEAST_32_CHARACTERS"
        }
      },
      "Logging": {
        "LogLevel": {
          "Default": "Information",
          "Microsoft.AspNetCore": "Warning",
          "Elsa": "Warning"
        }
      }
    }
