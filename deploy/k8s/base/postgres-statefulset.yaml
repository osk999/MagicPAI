apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: magicpai-postgres
  namespace: magicpai
  labels:
    app.kubernetes.io/name: magicpai-postgres
    app.kubernetes.io/part-of: magicpai
spec:
  serviceName: magicpai-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: magicpai-postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: magicpai-postgres
        app.kubernetes.io/part-of: magicpai
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: magicpai
            - name: POSTGRES_USER
              value: magicpai
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: magicpai-postgres-secret
                  key: password
                  optional: true
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "magicpai"]
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "magicpai"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
